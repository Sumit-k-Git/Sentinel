<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sentinel — Projection View</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --iss:#00ffe5; --amber:#ffaa00; --purple:#c084fc;
  --text:rgba(200,240,255,0.9); --dim:rgba(80,140,180,0.5); --faint:rgba(40,90,130,0.35);
}
html,body{width:100%;height:100%;background:#000208;overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--text);}
#canvas-full{position:fixed;inset:0;width:100%;height:100%;}

/* Scanline + vignette */
#scanline{position:fixed;inset:0;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 3px);}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:6;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.72) 100%);}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* Corner brackets */
.corner{position:absolute;width:48px;height:48px;}
.corner svg{width:100%;height:100%;}
.corner.tl{top:14px;left:14px}.corner.tr{top:14px;right:14px;transform:scaleX(-1)}
.corner.bl{bottom:14px;left:14px;transform:scaleY(-1)}.corner.br{bottom:14px;right:14px;transform:scale(-1)}

/* TOP — POV badge */
#pov-badge{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.pov-sat-icon{
  width:60px;height:60px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.pov-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(0,255,229,0.18);
  animation:ring-pulse 3s ease-in-out infinite;
}
.pov-ring:nth-child(2){animation-delay:1s;transform:scale(0.72);}
.pov-sat-icon svg{width:40px;height:40px;filter:drop-shadow(0 0 10px var(--sat-color,var(--iss)));}
#pov-name{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:var(--iss);text-shadow:0 0 12px var(--iss);}
#pov-mode-label{font-size:8px;letter-spacing:2px;color:var(--faint);font-family:'Orbitron',sans-serif;}

/* Left strip */
#strip-left{
  position:absolute;top:50%;transform:translateY(-50%);left:18px;
  display:flex;flex-direction:column;gap:9px;width:125px;
}
#strip-right{
  position:absolute;top:50%;transform:translateY(-50%);right:18px;
  display:flex;flex-direction:column;gap:9px;width:125px;align-items:flex-end;
}
.data-chip{
  background:rgba(0,6,16,0.65);
  border:1px solid rgba(0,255,229,0.07);
  border-radius:3px;padding:8px 11px;
  backdrop-filter:blur(10px);
  position:relative;overflow:hidden;
}
.data-chip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,229,0.025),transparent 60%);pointer-events:none;}
.chip-label{font-family:'Orbitron',sans-serif;font-size:6.5px;letter-spacing:2px;color:var(--faint);margin-bottom:3px;}
.chip-val{font-size:15px;font-weight:600;letter-spacing:0.5px;line-height:1;color:var(--iss);text-shadow:0 0 8px var(--iss);}
.chip-unit{font-size:8.5px;color:var(--dim);margin-left:2px;}

/* Nearby satellites list (my location POV) */
#nearby-list{
  position:absolute;top:50%;transform:translateY(-50%);right:18px;
  display:flex;flex-direction:column;gap:6px;width:145px;
}
.nearby-item{
  background:rgba(0,6,16,0.65);border:1px solid rgba(255,255,255,0.06);
  border-radius:3px;padding:7px 10px;backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:8px;
}
.nearby-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nearby-info{flex:1;min-width:0;}
.nearby-name{font-size:10px;font-weight:600;color:var(--text);letter-spacing:0.5px;}
.nearby-dist{font-size:8px;color:var(--dim);}

/* UTC + signal */
#hud-tr{
  position:absolute;top:20px;right:76px;
  text-align:right;display:flex;flex-direction:column;gap:3px;
}
#hud-clock{font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(0,255,229,0.38);letter-spacing:2px;}
#hud-signal{font-size:8px;letter-spacing:2px;color:var(--faint);font-family:'Orbitron',sans-serif;display:flex;align-items:center;justify-content:flex-end;gap:5px;}
.sig-d{width:5px;height:5px;border-radius:50%;animation:blink 2s ease infinite;}

/* Bottom bar */
#bottom-bar{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;
  background:rgba(0,5,15,0.72);border:1px solid rgba(0,255,229,0.06);
  border-radius:4px;padding:9px 22px;backdrop-filter:blur(14px);
  white-space:nowrap;
}
.bi{text-align:center;}
.bi-label{font-family:'Orbitron',sans-serif;font-size:6.5px;letter-spacing:1.8px;color:var(--faint);margin-bottom:2px;}
.bi-val{font-size:12px;font-weight:500;color:var(--text);letter-spacing:0.8px;}
.bsep{width:1px;height:28px;background:rgba(0,255,229,0.07);}

/* Overhead alert */
#overhead-alert{
  position:absolute;top:96px;left:50%;transform:translateX(-50%);
  background:rgba(0,255,229,0.04);border:1px solid rgba(0,255,229,0.28);
  border-radius:4px;padding:9px 26px;text-align:center;
  backdrop-filter:blur(12px);opacity:0;transition:opacity 0.8s;pointer-events:none;
}
#overhead-alert.show{opacity:1;}
#overhead-alert .alt{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--iss);}
#overhead-alert .asub{font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:1px;}

/* Ctrl link */
#ctrl-link{position:fixed;bottom:18px;right:18px;z-index:20;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--faint);text-decoration:none;pointer-events:all;transition:color 0.3s;}
#ctrl-link:hover{color:var(--iss);}

@keyframes ring-pulse{0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:0.12;transform:scale(1.18);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
</style>
</head>
<body>
<canvas id="canvas-full"></canvas>
<div id="scanline"></div>
<div id="vignette"></div>

<div id="hud">
  <!-- Corners -->
  <div class="corner tl"><svg viewBox="0 0 48 48" fill="none"><path d="M2 24V4a2 2 0 012-2h20" stroke="rgba(0,255,229,0.35)" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="2.5" fill="rgba(0,255,229,0.25)"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 48 48" fill="none"><path d="M2 24V4a2 2 0 012-2h20" stroke="rgba(0,255,229,0.35)" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="2.5" fill="rgba(0,255,229,0.25)"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 48 48" fill="none"><path d="M2 24V4a2 2 0 012-2h20" stroke="rgba(0,255,229,0.35)" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="2.5" fill="rgba(0,255,229,0.25)"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 48 48" fill="none"><path d="M2 24V4a2 2 0 012-2h20" stroke="rgba(0,255,229,0.35)" stroke-width="1.5" stroke-linecap="round"/><circle cx="4" cy="4" r="2.5" fill="rgba(0,255,229,0.25)"/></svg></div>

  <!-- POV Badge (center top) -->
  <div id="pov-badge">
    <div class="pov-sat-icon" id="pov-icon">
      <div class="pov-ring"></div><div class="pov-ring"></div>
      <svg id="pov-svg" viewBox="0 0 40 40" fill="none"><!-- dynamic --></svg>
    </div>
    <div id="pov-name">ISS · ZARYA</div>
    <div id="pov-mode-label">POV: SATELLITE TRACK</div>
  </div>

  <!-- Left data strip -->
  <div id="strip-left">
    <div class="data-chip"><div class="chip-label">LATITUDE</div><div class="chip-val" id="v-lat">—</div></div>
    <div class="data-chip"><div class="chip-label">LONGITUDE</div><div class="chip-val" id="v-lon">—</div></div>
    <div class="data-chip"><div class="chip-label">ALTITUDE</div><div class="chip-val" id="v-alt">—<span class="chip-unit">km</span></div></div>
  </div>

  <!-- Right strip — normal sat view -->
  <div id="strip-right">
    <div class="data-chip" style="text-align:right"><div class="chip-label">VELOCITY</div><div class="chip-val" id="v-vel">—<span class="chip-unit">km/s</span></div></div>
    <div class="data-chip" style="text-align:right"><div class="chip-label">FOOTPRINT</div><div class="chip-val" id="v-foot">—<span class="chip-unit">km</span></div></div>
    <div class="data-chip" style="text-align:right"><div class="chip-label">VISIBILITY</div><div class="chip-val" id="v-vis" style="font-size:12px">—</div></div>
  </div>

  <!-- Nearby list (my location POV) — hidden by default -->
  <div id="nearby-list" style="display:none"></div>

  <!-- Top right: clock + signal -->
  <div id="hud-tr">
    <div id="hud-clock">00:00:00 UTC</div>
    <div id="hud-signal"><div class="sig-d" id="v-sigdot" style="background:#1e3d56"></div><span id="v-siglab">ACQUIRING</span></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <div class="bi"><div class="bi-label">STATUS</div><div class="bi-val"><span id="v-status-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#1e3d56;margin-right:5px;animation:blink 2s ease infinite;"></span><span id="v-status">ACQUIRING</span></div></div>
    <div class="bsep"></div>
    <div class="bi"><div class="bi-label">POV MODE</div><div class="bi-val" id="v-pov-mode">—</div></div>
    <div class="bsep"></div>
    <div class="bi"><div class="bi-label">TRACKED</div><div class="bi-val" id="v-sat-count">—</div></div>
    <div class="bsep"></div>
    <div class="bi"><div class="bi-label">INCLINATION</div><div class="bi-val" id="v-inc">51.64°</div></div>
    <div class="bsep"></div>
    <div class="bi"><div class="bi-label">DATA SOURCE</div><div class="bi-val" style="font-size:9px">WHERETHEISS.AT</div></div>
  </div>

  <!-- Overhead alert -->
  <div id="overhead-alert">
    <div class="alt" id="oa-name">⚡ ISS OVERHEAD</div>
    <div class="asub" id="oa-sub">Station passing over your location</div>
  </div>
</div>

<a href="index.html" id="ctrl-link">⊙ CONTROL</a>

<script src="js/satellites.js"></script>
<script src="js/stars.js"></script>
<script src="js/renderer-view.js"></script>
<script src="js/tracker.js"></script>
<script src="js/audio.js"></script>
<script src="js/weather.js"></script>
<script src="js/notifications.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('canvas-full');
  RendererView.init(canvas);
  StarField.generate(window.innerWidth,window.innerHeight,900);

  let myLat=null,myLon=null,currentPOV='my_location';
  let t0=performance.now();
  let prevOverhead={};

  // ISS SVG templates per satellite type
  const SAT_SVGS={
    default:`<rect x="15" y="18" width="10" height="4" rx="0.5" fill="currentColor" opacity="0.9"/>
      <rect x="3" y="16.5" width="10" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
      <rect x="3" y="20.5" width="10" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
      <rect x="27" y="16.5" width="10" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
      <rect x="27" y="20.5" width="10" height="3" rx="0.5" fill="currentColor" opacity="0.5"/>
      <line x1="3" y1="20" x2="37" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>`,
    telescope:`<circle cx="20" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
      <circle cx="20" cy="20" r="3" fill="currentColor" opacity="0.9"/>
      <line x1="20" y1="4" x2="20" y2="12" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <line x1="20" y1="28" x2="20" y2="36" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <rect x="4" y="18" width="8" height="4" rx="1" fill="currentColor" opacity="0.4"/>
      <rect x="28" y="18" width="8" height="4" rx="1" fill="currentColor" opacity="0.4"/>`,
    weather:`<circle cx="20" cy="18" r="9" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
      <line x1="4" y1="20" x2="36" y2="20" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.4"/>
      <circle cx="20" cy="18" r="3" fill="currentColor" opacity="0.8"/>
      <path d="M8 28 Q14 24 20 28 Q26 32 32 28" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>`,
    starlink:`<circle cx="20" cy="20" r="2" fill="currentColor" opacity="0.9"/>
      <rect x="4" y="19" width="32" height="2" rx="1" fill="currentColor" opacity="0.5"/>
      <circle cx="8" cy="20" r="1.5" fill="currentColor" opacity="0.6"/>
      <circle cx="14" cy="20" r="1.5" fill="currentColor" opacity="0.6"/>
      <circle cx="26" cy="20" r="1.5" fill="currentColor" opacity="0.6"/>
      <circle cx="32" cy="20" r="1.5" fill="currentColor" opacity="0.6"/>`,
    location:`<circle cx="20" cy="20" r="14" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      <line x1="20" y1="6" x2="20" y2="34" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
      <line x1="6" y1="20" x2="34" y2="20" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
      <circle cx="20" cy="20" r="3" fill="currentColor" opacity="0.9"/>`
  };

  function getSatTemplate(id){
    const id_=parseInt(id);
    if(id_===20580) return 'telescope';
    if([43205,25338,28654,27424,39084].includes(id_)) return 'weather';
    if([44713,44914].includes(id_)) return 'starlink';
    return 'default';
  }

  function updatePOVBadge(pov, satellites){
    const svg=document.getElementById('pov-svg');
    const nameEl=document.getElementById('pov-name');
    const modeEl=document.getElementById('pov-mode-label');

    if(pov==='my_location'){
      svg.innerHTML=SAT_SVGS.location;
      svg.style.color='#ffaa00';
      document.getElementById('pov-icon').style.setProperty('--sat-color','#ffaa00');
      nameEl.textContent='MY LOCATION';
      nameEl.style.color='#ffaa00';
      nameEl.style.textShadow='0 0 12px #ffaa00';
      modeEl.textContent='POV: GROUND STATION';
    } else if(pov==='global'){
      svg.innerHTML=SAT_SVGS.location;
      svg.style.color='#c084fc';
      nameEl.textContent='GLOBAL VIEW';
      nameEl.style.color='#c084fc';
      nameEl.style.textShadow='0 0 12px #c084fc';
      modeEl.textContent='POV: ALL SATELLITES';
    } else {
      const id=parseInt(pov);
      const cat=SATELLITE_CATALOG[id];
      if(!cat) return;
      svg.innerHTML=SAT_SVGS[getSatTemplate(id)];
      svg.style.color=cat.color;
      nameEl.textContent=cat.name;
      nameEl.style.color=cat.color;
      nameEl.style.textShadow=`0 0 12px ${cat.color}`;
      modeEl.textContent=`POV: SATELLITE TRACK`;
    }
  }

  function updateHUD(satellites, pov){
    // Primary data — show focused sat or ISS
    const focusId = (pov==='my_location'||pov==='global') ? 25544 : parseInt(pov);
    const sat = satellites[focusId];
    const cat = SATELLITE_CATALOG[focusId];

    if(sat&&sat.lat!==undefined){
      setText('v-lat', fmtCoord(sat.lat,'N','S'));
      setText('v-lon', fmtCoord(sat.lon,'E','W'));
      setText('v-alt', `${sat.alt?sat.alt.toFixed(1):'—'}<span class="chip-unit">km</span>`);
      setText('v-vel', `${sat.velocity?(sat.velocity/1000).toFixed(2):'—'}<span class="chip-unit">km/s</span>`);
      setText('v-foot', `${sat.footprint?Math.round(sat.footprint):'—'}<span class="chip-unit">km</span>`);
      setText('v-vis', (sat.visibility||'—').toUpperCase());
      if(cat) document.getElementById('v-inc').textContent=cat.inc+'°';
    }

    // POV mode label in bottom bar
    const povLabels={'my_location':'MY LOCATION','global':'GLOBAL'};
    document.getElementById('v-pov-mode').textContent=povLabels[pov]||(SATELLITE_CATALOG[parseInt(pov)]?.short||pov);
    document.getElementById('v-sat-count').textContent=Object.keys(satellites).length+' SAT';

    // Nearby list (my_location POV)
    const nearbyEl=document.getElementById('nearby-list');
    const stripR=document.getElementById('strip-right');
    if(pov==='my_location'&&myLat!==null){
      nearbyEl.style.display='flex';
      stripR.style.display='none';
      renderNearbyList(satellites);
    } else {
      nearbyEl.style.display='none';
      stripR.style.display='flex';
    }

    // Overhead alert
    checkOverheadAlert(satellites);
  }

  function renderNearbyList(satellites){
    const el=document.getElementById('nearby-list');
    const nearby=[];
    for(const [idStr,sat] of Object.entries(satellites)){
      if(!sat.lat&&sat.lat!==0) continue;
      const cat=SATELLITE_CATALOG[parseInt(idStr)];
      if(!cat) continue;
      const dist=haversine(myLat,myLon,sat.lat,sat.lon);
      nearby.push({cat,sat,dist});
    }
    nearby.sort((a,b)=>a.dist-b.dist);
    el.innerHTML=nearby.slice(0,6).map(({cat,sat,dist})=>`
      <div class="nearby-item">
        <div class="nearby-dot" style="background:${cat.color};box-shadow:0 0 5px ${cat.color}"></div>
        <div class="nearby-info">
          <div class="nearby-name">${cat.emoji} ${cat.short}</div>
          <div class="nearby-dist">${Math.round(dist).toLocaleString()} km away</div>
        </div>
      </div>`).join('');
  }

  function checkOverheadAlert(satellites){
    const alert=document.getElementById('overhead-alert');
    let anyOverhead=false;
    for(const [idStr,sat] of Object.entries(satellites)){
      if(!sat.lat&&sat.lat!==0) continue;
      if(myLat===null) break;
      const dist=haversine(myLat,myLon,sat.lat,sat.lon);
      const cat=SATELLITE_CATALOG[parseInt(idStr)];
      if(dist<900&&cat){
        document.getElementById('oa-name').textContent=`⚡ ${cat.short} OVERHEAD`;
        document.getElementById('oa-sub').textContent=`${Math.round(dist)} km away · Alt ${cat.alt} km`;
        anyOverhead=true; break;
      }
    }
    alert.classList.toggle('show', anyOverhead);
  }

  // Clock
  setInterval(()=>{
    const n=new Date();
    document.getElementById('hud-clock').textContent=[n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()].map(v=>String(v).padStart(2,'0')).join(':')+' UTC';
  },1000);

  // BroadcastChannel from control panel
  try{
    const bc=new BroadcastChannel('sentinel_ctrl');
    bc.onmessage=e=>{
      const d=e.data;
      if(d.type==='location'){ myLat=d.lat; myLon=d.lon; RendererView.setMyLocation(myLat,myLon); Tracker.setLocation(myLat,myLon); if(d.weatherEnabled) WeatherLayer.enable(myLat,myLon); }
      if(d.type==='opts') RendererView.setOpts(d.opts);
      if(d.type==='pov'){ currentPOV=d.pov; RendererView.setPOV(d.pov); Tracker.setPOV(d.pov); updatePOVBadge(d.pov,{}); }
      if(d.type==='brightness') document.body.style.filter=`brightness(${d.value})`;
      if(d.type==='audio'){ d.enabled?AudioEngine.enable():AudioEngine.disable(); }
      if(d.type==='weather'){ d.enabled?WeatherLayer.enable(myLat,myLon):WeatherLayer.disable(); }
      if(d.type==='notify'){ d.enabled?PassNotifications.enable():PassNotifications.disable(); }
    };
  }catch(e){}

  // Restore saved state
  try{
    const loc=JSON.parse(localStorage.getItem('sentinel_loc')||'null');
    if(loc){ myLat=loc.lat; myLon=loc.lon; RendererView.setMyLocation(myLat,myLon); Tracker.setLocation(myLat,myLon); }
    const pov=localStorage.getItem('sentinel_pov')||'my_location';
    currentPOV=pov; RendererView.setPOV(pov); Tracker.setPOV(pov);
  }catch(e){}

  Tracker.on('update',d=>{
    RendererView.setSatellites(d.satellites);
    updateHUD(d.satellites, currentPOV);
    updatePOVBadge(currentPOV, d.satellites);
    AudioEngine.updateState({ altitude: d.satellites[25544]?.alt||408, distKm: myLat!==null?haversine(myLat,myLon,d.satellites[25544]?.lat||0,d.satellites[25544]?.lon||0):9999, overhead:false });
    PassNotifications.checkPasses(d.satellites, myLat, myLon);
  });

  Tracker.on('status',s=>{
    const dot=document.getElementById('v-sigdot');
    const lbl=document.getElementById('v-siglab');
    const sdot=document.getElementById('v-status-dot');
    if(s==='live'){ dot.style.background='#00ffe5'; dot.style.boxShadow='0 0 8px #00ffe5'; lbl.textContent='LIVE'; sdot.style.background='#00ffe5'; sdot.style.boxShadow='0 0 8px #00ffe5'; document.getElementById('v-status').textContent='LIVE'; }
    else { dot.style.background='#ffaa00'; lbl.textContent='DEMO'; sdot.style.background='#ffaa00'; document.getElementById('v-status').textContent='DEMO'; }
  });

  Tracker.setPOV(currentPOV);
  Tracker.start();

  window.addEventListener('resize',()=>{ RendererView.resize(); StarField.generate(window.innerWidth,window.innerHeight,900); });

  function loop(ts){ RendererView.draw(ts-t0); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);

  function setText(id,html){ const el=document.getElementById(id); if(el) el.innerHTML=html; }
  function fmtCoord(v,p,n){ return `${Math.abs(v).toFixed(3)}° ${v>=0?p:n}`; }
  function haversine(a,b,c,d){ const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180; const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
})();
</script>
